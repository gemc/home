<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 800" role="img" aria-label="GEMC GUI Display page">
  <title>GEMC GUI — Display page</title>
  <defs>
    <!-- arrowhead for annotations -->
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c8200e"/>
    </marker>
    <style>
      :root {
        color-scheme: light dark;
        --bg:       #f2f2f7;
        --chrome:   #e5e5ea;
        --panel:    #ffffff;
        --section:  #e8e8ed;
        --border:   #c7c7cc;
        --ink:      #1c1c1e;
        --muted:    #6e6e73;
        --active:   #007aff;
        --toggle:   #e05a52;
        --input:    #ffffff;
        --ann-fill: rgba(255,255,255,0.96);
        --ann-stroke:#1a50c0;
        --ann-ink:  #0a0a0a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:       #1c1c1e;
          --chrome:   #2c2c2e;
          --panel:    #2c2c2e;
          --section:  #3a3a3c;
          --border:   #545458;
          --ink:      #f2f2f7;
          --muted:    #aeaeb2;
          --input:    #3a3a3c;
          --ann-fill: rgba(28,28,30,0.96);
          --ann-stroke:#5b8cff;
          --ann-ink:  #f0f0f0;
        }
      }
      text { font-family: Avenir, "Segoe UI", Arial, sans-serif; }
      .ui-label   { fill: var(--ink);   font-size: 11px; }
      .ui-small   { fill: var(--muted); font-size: 10px; }
      .sec-title  { fill: var(--muted); font-size: 10px; font-weight: 600; letter-spacing:.4px; text-transform: uppercase; }
      .toggle-lbl { fill: #ffffff;      font-size: 11px; font-weight: 700; text-anchor: middle; }
      .topbar-btn { fill: var(--chrome); stroke: var(--border); stroke-width: 1; }
      .page-btn   { fill: var(--chrome); stroke: var(--border); stroke-width: 1; }
      .page-active{ fill: var(--active); }
      .section-box{ fill: var(--section); stroke: var(--border); stroke-width: 1; }
      .input-box  { fill: var(--input);   stroke: var(--border); stroke-width: 1; }
      .slider-track{ fill: var(--border); }
      .slider-thumb{ fill: var(--input);  stroke: var(--border); stroke-width: 1.5; }
      /* annotations */
      .ann-box  { fill: var(--ann-fill); stroke: var(--ann-stroke); stroke-width: 1.8; }
      .ann-text { fill: var(--ann-ink);  font-size: 11.5px; font-weight: 700; text-anchor: middle; }
      .ann-line { stroke: #c8200e; stroke-width: 2.2; fill: none; marker-end: url(#arr); }
    </style>
  </defs>

  <!-- ── window background ──────────────────────────────────────── -->
  <rect width="980" height="800" fill="var(--bg)"/>

  <!-- ── top bar ───────────────────────────────────────────────── -->
  <rect x="0" y="0" width="980" height="50" fill="var(--chrome)"/>
  <text x="14" y="30" class="ui-label">N. Events:</text>
  <rect x="84"  y="14" width="36" height="22" rx="4" class="input-box"/>
  <text x="102" y="30" class="ui-label" text-anchor="middle">1</text>
  <rect x="130" y="11" width="54" height="26" rx="6" class="topbar-btn"/>
  <text x="157" y="29" class="ui-label" text-anchor="middle">▶ Run</text>
  <rect x="192" y="11" width="62" height="26" rx="6" class="topbar-btn"/>
  <text x="223" y="29" class="ui-label" text-anchor="middle">↻ Cycle</text>
  <rect x="262" y="11" width="56" height="26" rx="6" class="topbar-btn"/>
  <text x="290" y="29" class="ui-label" text-anchor="middle">■ Stop</text>
  <text x="332" y="30" class="ui-label">Event Number: 0</text>
  <rect x="904" y="11" width="62" height="26" rx="6" class="topbar-btn"/>
  <text x="935" y="29" class="ui-label" text-anchor="middle">✕ Exit</text>

  <!-- ── left sidebar ──────────────────────────────────────────── -->
  <rect x="0" y="50" width="112" height="750" fill="var(--chrome)" stroke="var(--border)" stroke-width="0.5"/>

  <!-- Display (active) — icon: src/gui/images/buttons/display_1.svg -->
  <rect x="11" y="60" width="90" height="90" rx="10" class="page-active"/>
  <g transform="translate(11,60) scale(1.875)" style="color:white">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <rect x="14" y="12" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="24" y1="24" x2="24" y2="29" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">Display</text>
  </g>

  <!-- G4Dialog — icon: src/gui/images/buttons/dialog_1.svg -->
  <rect x="11" y="160" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,160) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="6" y1="12" x2="42" y2="12" stroke="currentColor" stroke-width="1"/>
    <text x="24" y="25" text-anchor="middle" fill="currentColor" font-size="10" font-family="Monaco">&gt;_</text>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">G4Dialog</text>
  </g>

  <!-- Setup — icon: src/gui/images/buttons/setup_1.svg -->
  <rect x="11" y="260" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,260) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <rect x="10.5" y="8"  width="6" height="6" fill="currentColor"/>
    <rect x="17.5" y="8"  width="6" height="6" fill="currentColor"/>
    <rect x="24.5" y="8"  width="6" height="6" fill="#CCCCCC"/>
    <rect x="31.5" y="8"  width="6" height="6" fill="currentColor"/>
    <rect x="10.5" y="15" width="6" height="6" fill="currentColor"/>
    <rect x="17.5" y="15" width="6" height="6" fill="#CCCCCC"/>
    <rect x="24.5" y="15" width="6" height="6" fill="currentColor"/>
    <rect x="31.5" y="15" width="6" height="6" fill="currentColor"/>
    <rect x="10.5" y="22" width="6" height="6" fill="currentColor"/>
    <rect x="17.5" y="22" width="6" height="6" fill="currentColor"/>
    <rect x="24.5" y="22" width="6" height="6" fill="currentColor"/>
    <rect x="31.5" y="22" width="6" height="6" fill="#CCCCCC"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">Setup</text>
  </g>

  <!-- Volumes — icon: src/gui/images/buttons/tree_1.svg -->
  <rect x="11" y="360" width="90" height="90" rx="10" class="page-btn"/>
  <g transform="translate(11,360) scale(1.875)" style="color:var(--muted)">
    <rect x="6" y="6" width="36" height="36" rx="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="16" cy="16" rx="6" ry="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <rect x="10" y="16" width="12" height="8" fill="none" stroke="currentColor" stroke-width="1"/>
    <ellipse cx="16" cy="24" rx="6" ry="3" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="28" y1="14" x2="28" y2="26" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="34" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <circle cx="36" cy="18" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="28" y1="22" x2="34" y2="22" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <circle cx="36" cy="22" r="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="24" y="38" text-anchor="middle" fill="currentColor" font-size="8" font-family="Arial">Volumes</text>
  </g>

  <!-- ── main content panel ─────────────────────────────────────── -->
  <rect x="120" y="56" width="848" height="736" rx="8" fill="var(--panel)" stroke="var(--border)" stroke-width="0.5"/>

  <!-- View / Utilities tabs -->
  <rect x="428" y="64" width="66" height="24" rx="12" fill="var(--active)"/>
  <text x="461" y="81" text-anchor="middle" fill="white" font-size="12" font-family="Avenir,Arial,sans-serif">View</text>
  <text x="552" y="81" text-anchor="middle" class="ui-small">Utilities</text>

  <!-- ── six red toggle buttons ─────────────────────────────────── -->
  <rect x="148" y="97" width="84" height="72" rx="9" fill="var(--toggle)"/>
  <text x="190" y="137" class="toggle-lbl">Hidden</text>
  <text x="190" y="151" class="toggle-lbl">Lines</text>

  <rect x="241" y="97" width="84" height="72" rx="9" fill="var(--toggle)"/>
  <text x="283" y="137" class="toggle-lbl">Anti</text>
  <text x="283" y="151" class="toggle-lbl">Aliasing</text>

  <rect x="334" y="97" width="84" height="72" rx="9" fill="var(--toggle)"/>
  <text x="376" y="137" class="toggle-lbl">Auxiliary</text>
  <text x="376" y="151" class="toggle-lbl">Edges</text>

  <rect x="427" y="97" width="84" height="72" rx="9" fill="var(--toggle)"/>
  <text x="469" y="137" class="toggle-lbl">Field</text>
  <text x="469" y="151" class="toggle-lbl">Lines</text>

  <rect x="520" y="97" width="72" height="72" rx="9" fill="var(--toggle)"/>
  <text x="556" y="141" class="toggle-lbl">Axes</text>

  <rect x="601" y="97" width="72" height="72" rx="9" fill="var(--toggle)"/>
  <text x="637" y="141" class="toggle-lbl">Scale</text>

  <!-- Number of Field Points -->
  <rect x="684" y="97" width="166" height="72" rx="7" class="section-box"/>
  <text x="767" y="116" class="sec-title" text-anchor="middle">Number of Field Points</text>
  <text x="767" y="150" text-anchor="middle" fill="var(--ink)" font-size="24" font-weight="600" font-family="Avenir,Arial,sans-serif">5</text>

  <!-- ── Camera Direction section ───────────────────────────────── -->
  <rect x="136" y="188" width="596" height="172" rx="7" class="section-box"/>
  <text x="153" y="208" class="sec-title">Camera Direction</text>
  <!-- θ row -->
  <text x="153" y="255" class="ui-small">θ</text>
  <rect x="168" y="248" width="376" height="5" rx="2.5" class="slider-track"/>
  <circle cx="258" cy="250.5" r="9" class="slider-thumb"/>
  <rect x="552" y="240" width="50" height="20" rx="4" class="input-box"/>
  <text x="577" y="255" class="ui-small" text-anchor="middle">0</text>
  <rect x="606" y="240" width="20" height="20" rx="4" class="input-box"/>
  <text x="616" y="255" class="ui-small" text-anchor="middle">⌄</text>
  <!-- φ row -->
  <text x="153" y="323" class="ui-small">φ</text>
  <rect x="168" y="316" width="376" height="5" rx="2.5" class="slider-track"/>
  <circle cx="214" cy="318.5" r="9" class="slider-thumb"/>
  <rect x="552" y="308" width="50" height="20" rx="4" class="input-box"/>
  <text x="577" y="323" class="ui-small" text-anchor="middle">0</text>
  <rect x="606" y="308" width="20" height="20" rx="4" class="input-box"/>
  <text x="616" y="323" class="ui-small" text-anchor="middle">⌄</text>

  <!-- ── View Properties section ────────────────────────────────── -->
  <rect x="746" y="188" width="204" height="172" rx="7" class="section-box"/>
  <text x="762" y="208" class="sec-title">View Properties</text>
  <!-- Projection -->
  <text x="762" y="234" class="ui-label">Projection:</text>
  <rect x="762" y="239" width="174" height="24" rx="5" class="input-box"/>
  <text x="845" y="256" class="ui-label" text-anchor="middle">Orthogonal</text>
  <text x="926" y="256" class="ui-small" text-anchor="middle">⌄</text>
  <!-- Sides per circle -->
  <text x="762" y="286" class="ui-label">Sides per circle:</text>
  <rect x="762" y="291" width="174" height="24" rx="5" class="input-box"/>
  <text x="845" y="308" class="ui-label" text-anchor="middle">50</text>
  <text x="926" y="308" class="ui-small" text-anchor="middle">⌄</text>

  <!-- ── Light Direction section ────────────────────────────────── -->
  <rect x="136" y="376" width="490" height="172" rx="7" class="section-box"/>
  <text x="153" y="396" class="sec-title">Light Direction</text>
  <!-- θ row -->
  <text x="153" y="440" class="ui-small">θ</text>
  <rect x="168" y="433" width="296" height="5" rx="2.5" class="slider-track"/>
  <circle cx="230" cy="435.5" r="9" class="slider-thumb"/>
  <rect x="472" y="425" width="50" height="20" rx="4" class="input-box"/>
  <text x="497" y="440" class="ui-small" text-anchor="middle">0</text>
  <rect x="526" y="425" width="20" height="20" rx="4" class="input-box"/>
  <text x="536" y="440" class="ui-small" text-anchor="middle">⌄</text>
  <!-- φ row -->
  <text x="153" y="508" class="ui-small">φ</text>
  <rect x="168" y="501" width="296" height="5" rx="2.5" class="slider-track"/>
  <circle cx="210" cy="503.5" r="9" class="slider-thumb"/>
  <rect x="472" y="493" width="50" height="20" rx="4" class="input-box"/>
  <text x="497" y="508" class="ui-small" text-anchor="middle">0</text>
  <rect x="526" y="493" width="20" height="20" rx="4" class="input-box"/>
  <text x="536" y="508" class="ui-small" text-anchor="middle">⌄</text>

  <!-- ── Scene Properties section ──────────────────────────────── -->
  <rect x="638" y="376" width="312" height="172" rx="7" class="section-box"/>
  <text x="654" y="396" class="sec-title">Scene Properties</text>
  <text x="654" y="422" class="ui-label">Culling:</text>
  <rect x="654" y="427" width="188" height="24" rx="5" class="input-box"/>
  <text x="740" y="444" class="ui-label" text-anchor="middle">Reset</text>
  <text x="832" y="444" class="ui-small" text-anchor="middle">⌄</text>
  <text x="654" y="472" class="ui-label">Background Color:</text>
  <rect x="654" y="477" width="148" height="24" rx="5" class="input-box"/>
  <text x="724" y="494" class="ui-label" text-anchor="middle">custom</text>
  <rect x="808" y="477" width="24" height="24" rx="4" fill="#1a1a2e" stroke="var(--border)" stroke-width="1"/>

  <!-- ── X / Y / Z slice rows ──────────────────────────────────── -->
  <!-- X -->
  <text x="140" y="575" class="ui-label">X:</text>
  <rect x="156" y="560" width="90" height="22" rx="4" class="input-box"/>
  <text x="201" y="576" class="ui-label" text-anchor="middle">0</text>
  <rect x="484" y="561" width="14" height="14" rx="2" class="input-box"/>
  <text x="502" y="574" class="ui-label">On</text>
  <rect x="540" y="561" width="14" height="14" rx="2" class="input-box"/>
  <text x="558" y="574" class="ui-label">Flip</text>

  <!-- Y -->
  <text x="140" y="615" class="ui-label">Y:</text>
  <rect x="156" y="600" width="90" height="22" rx="4" class="input-box"/>
  <text x="201" y="616" class="ui-label" text-anchor="middle">0</text>
  <rect x="484" y="601" width="14" height="14" rx="2" class="input-box"/>
  <text x="502" y="614" class="ui-label">On</text>
  <rect x="540" y="601" width="14" height="14" rx="2" class="input-box"/>
  <text x="558" y="614" class="ui-label">Flip</text>

  <!-- Z -->
  <text x="140" y="655" class="ui-label">Z:</text>
  <rect x="156" y="640" width="90" height="22" rx="4" class="input-box"/>
  <text x="201" y="656" class="ui-label" text-anchor="middle">0</text>
  <rect x="484" y="641" width="14" height="14" rx="2" class="input-box"/>
  <text x="502" y="654" class="ui-label">On</text>
  <rect x="540" y="641" width="14" height="14" rx="2" class="input-box"/>
  <text x="558" y="654" class="ui-label">Flip</text>

  <!-- Slices Style -->
  <text x="140" y="684" class="ui-label">Slices Style</text>
  <circle cx="158" cy="701" r="7" fill="var(--active)"/>
  <circle cx="158" cy="701" r="3" fill="white"/>
  <text x="171" y="706" class="ui-label">Intersection</text>
  <circle cx="300" cy="701" r="7" fill="none" stroke="var(--border)" stroke-width="1.5"/>
  <text x="313" y="706" class="ui-label">Union</text>

  <!-- Clear Slices button -->
  <rect x="136" y="718" width="816" height="30" rx="6" class="section-box"/>
  <text x="544" y="738" class="ui-label" text-anchor="middle">✕  Clear Slices</text>

  <!-- ═════════════════════════════════════════════════════════════
       ANNOTATIONS
       ═════════════════════════════════════════════════════════════ -->

  <!-- 1 · Toggle rendering options
       Label above buttons, arrow down to center of toggle row    -->
  <line x1="459" y1="91" x2="459" y2="97" class="ann-line"/>
  <rect x="340" y="72" width="238" height="20" rx="5" class="ann-box"/>
  <text x="459" y="86" class="ann-text">Toggle rendering options</text>

  <!-- 2 · Slide to orbit camera
       Label inside camera box just below header, arrow to θ thumb -->
  <line x1="380" y1="240" x2="268" y2="251" class="ann-line"/>
  <rect x="254" y="220" width="196" height="20" rx="5" class="ann-box"/>
  <text x="352" y="234" class="ann-text">Slide to orbit camera</text>

  <!-- 3 · Projection and precision — TWO arrows (Projection + Sides)
       Label in gap between NFP and View Properties             -->
  <line x1="838" y1="206" x2="838" y2="239" class="ann-line"/>
  <line x1="860" y1="206" x2="860" y2="291" class="ann-line"/>
  <rect x="730" y="185" width="248" height="20" rx="5" class="ann-box"/>
  <text x="854" y="199" class="ann-text">Projection and precision</text>

  <!-- 4 · Reposition light source
       Label inside light box near bottom, arrow up to θ thumb   -->
  <line x1="320" y1="542" x2="238" y2="444" class="ann-line"/>
  <rect x="192" y="546" width="228" height="20" rx="5" class="ann-box"/>
  <text x="306" y="560" class="ann-text">Reposition light source</text>

  <!-- 5 · Cut planes position
       Label right of On/Flip, horizontal arrow to X input       -->
  <line x1="630" y1="571" x2="250" y2="571" class="ann-line"/>
  <rect x="632" y="561" width="196" height="20" rx="5" class="ann-box"/>
  <text x="730" y="575" class="ann-text">Cut planes position</text>

  <!-- 6 · CUT Switch
       Label right of On/Flip on Y row, arrow left to Y "On" checkbox -->
  <line x1="630" y1="611" x2="500" y2="608" class="ann-line"/>
  <rect x="632" y="601" width="118" height="20" rx="5" class="ann-box"/>
  <text x="691" y="615" class="ann-text">CUT Switch</text>

</svg>
