- title: "Cherenkov"
  header: "Showcases the activation of the Cherenkov radiation in a GEMC detector"
  category: "optical"
  link: "/home/examples/optical/cherenkov"
  display: true
  binder: "https://mybinder.org/v2/gh/gemc/binder-tutorials/main?urlpath=lab/tree/notebooks/optical/cherenkov.ipynb"
  badge: "https://img.shields.io/badge/-Cherenkov-579aca.svg?logo=data:image/png;base64,"
  codespaces: "https://codespaces.new/gemc/binder-tutorials?devcontainer_path=.devcontainer%2Fcherenkov%2Fdevcontainer.json&quickstart=1"
  codespaces_badge: "https://img.shields.io/badge/-Cherenkov-black.svg?logo=github"
  vtz_zoom:  0.0017
  pyvista-fast: false
  gallery: true
  vtksz: "/home/assets/images/examples/cherenkov/cherenkov.vtksz"
  snevents: 1
  pevents: 1
  to_plot: totEdep, yvsx
  variation_plots:
    - variation: default
      label: low_index_radiator
      name: lowIndexRadiator
    - variation: mediumIndexRadiator
      label: medium_index_radiator
      name: mediumIndexRadiator
    - variation: highIndexRadiator
      label: high_index_radiator
      name: highIndexRadiator


- title: "DC"
  gallery_title: "CLAS12/DC"
  header: "CLAS12 drift chamber geometry built from the clas12-systems geometry source"
  category: "clas12"
  link: "/home/examples/clas12/dc"
  display: false
  vtz_zoom: 0.0003
  pyvista-fast: false
  gallery: true
  vtksz: "/home/assets/images/examples/dc/dc.vtksz"
  snevents: 1
  source_dir: "../clas12-systems/geometry_src/dc"
  source_support:
    - "clas12_common.py"
    - "coatjava"
    - "coatjava_factories"
  gemc_args:
    - "-plugin_path=/opt/projects/gemc/clas12-systems/build"

